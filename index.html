<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalR Chat Client</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 450px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; overflow: hidden; }
        .chat-header { background: #0078d4; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .messages-list { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 8px 12px; border-radius: 15px; max-width: 75%; word-wrap: break-word; }
        .message.incoming { background: #e4e6eb; align-self: flex-start; }
        .message.system { background: #fff3cd; color: #856404; align-self: center; font-size: 12px; border-radius: 5px; }
        .chat-input-area { display: flex; padding: 10px; border-top: 1px solid #eee; background: #fff; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .chat-input-area button { background: #0078d4; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .chat-input-area button:hover { background: #005a9e; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
</head>
<body>

<div class="chat-container">
    <div class="chat-header" id="chatHeader">Чат (Подключение...)</div>
    <div class="messages-list" id="messagesList"></div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Ваше имя..." style="max-width: 100px;">
        <input type="text" id="messageInput" placeholder="Введите сообщение..." disabled>
        <button id="sendButton" disabled>Отправить</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
